name: CI

# Dev safety net. Runs on every push and pull request.
# Since the multi-zone cutover (M4), cenacrew.com/qrcode is served by the
# MosaLink zone (cenacrew/MosaLink) through the hub's rewrites — its build and
# Playwright guards live in that repo. This hub CI now covers the portfolio web
# app (build + lint) plus the still-in-repo mobile (tsc) and shared (unit tests)
# packages, which move out in M5.
on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Node 24 + corepack-managed pnpm (version pinned by packageManager in
      # package.json), with the pnpm store cached between runs.
      - name: Enable corepack (pnpm)
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ---- Static checks -------------------------------------------------
      # `pnpm lint` is a true zero-error gate; any NEW lint error fails CI.
      - name: Lint (web)
        run: pnpm lint

      - name: Typecheck (mobile, tsc --noEmit)
        run: pnpm --filter mobile exec tsc --noEmit

      - name: Unit tests (shared — collision resolver + widget Zod schemas)
        run: pnpm test

      # ---- Build the hub web app (portfolio) -----------------------------
      - name: Build web
        run: pnpm build
