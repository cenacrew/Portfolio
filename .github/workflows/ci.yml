name: CI

# Dev safety net for the cenacrew.com hub. Runs on every push and pull request.
# The hub is a plain Next.js portfolio: every MosaLink path (/qrcode,
# /adminqrcode, /api, …) is proxied to the cenacrew/MosaLink zone via the
# rewrites in apps/web/next.config.ts, so this CI only needs to lint and build
# the hub's web app. It runs with no env vars.
on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Node 24 + corepack-managed pnpm (version pinned by packageManager in
      # package.json), with the pnpm store cached between runs.
      - name: Enable corepack (pnpm)
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm lint` is a true zero-error gate; any NEW lint error fails CI.
      - name: Lint (web)
        run: pnpm lint

      - name: Build web
        run: pnpm build
